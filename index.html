<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faith Lock & Safe - Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<style>
body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f0f0; }
.box { background: white; padding: 2rem; border: 1px solid #ccc; width: 320px; }
h2 { margin-top: 0; font-size: 1.2rem; }
label { font-size: 0.85rem; font-weight: bold; }
input { width: 100%; padding: 0.5rem; margin: 0.3rem 0 1rem; box-sizing: border-box; border: 1px solid #ccc; }
button { width: 100%; padding: 0.6rem; background: #1a1a1a; color: white; border: none; cursor: pointer; font-size: 1rem; }
button:hover { background: #333; }
.err { color: red; font-size: 0.85rem; margin-top: 0.5rem; }
</style>
</head>
<body>
<div class="box">
  <h2>Faith Lock &amp; Safe Co.</h2>
  <p style="font-size:0.85rem;color:#555;margin-top:0;">Job Management System</p>
  <label>Email</label>
  <input type="email" id="email" placeholder="email@example.com">
  <label>Password</label>
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Sign In</button>
  <div class="err" id="err"></div>
</div>

<script>
// ---- INIT ----
// If the user already has an active session (e.g. they bookmarked the page
// while logged in), skip the login form and redirect them immediately.
db.auth.getSession().then(({ data }) => {
  if (data.session) redirectByRole(data.session.user.id);
});

// ---- LOGIN ----
async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err      = document.getElementById('err');
  err.textContent = '';

  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) { err.textContent = error.message; return; }

  redirectByRole(data.user.id);
}

// redirectByRole: looks up the user's role in user_profiles and sends them
// to the correct page. Admins go to the full management dashboard;
// technicians go to the simplified field view.
async function redirectByRole(uid) {
  const { data } = await db.from('user_profiles').select('role').eq('id', uid).single();
  if (!data) { document.getElementById('err').textContent = 'Profile not found. Contact admin.'; return; }
  if (data.role === 'admin') window.location.href = 'admin.html';
  else window.location.href = 'tech.html';
}

// Allow Enter key to submit the form (common user expectation on login screens)
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
